<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 636 580" preserveAspectRatio="xMidYMid meet">
  <defs>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00A8A8"/>
    </marker>
  </defs>

  <!-- 1단계: SKILL.md 작성 (한 번) -->
  <rect x="40" y="20" width="556" height="140" rx="8" fill="#161E2D" stroke="#00A8A8" stroke-width="2"/>
  <text x="60" y="48" fill="#00A8A8" font-family="D2Coding" font-size="14" font-weight="bold">[ 1. SKILL.md 작성 (한 번) ]</text>
  <text x="60" y="78" fill="#FFFFFF" font-family="D2Coding" font-size="13">.claude/skills/deploy/SKILL.md</text>
  <text x="60" y="100" fill="#E6EDF3" font-family="D2Coding" font-size="13">  ---</text>
  <text x="60" y="120" fill="#E6EDF3" font-family="D2Coding" font-size="13">  description: Deploy workflow</text>
  <text x="60" y="140" fill="#E6EDF3" font-family="D2Coding" font-size="13">  body: [긴 지침 N항목]</text>

  <!-- 화살표: git 커밋 -->
  <line x1="318" y1="170" x2="318" y2="200" stroke="#00A8A8" stroke-width="2" marker-end="url(#arrow-teal)"/>
  <text x="318" y="190" fill="#00A8A8" font-family="D2Coding" font-size="12" text-anchor="middle">git commit</text>

  <!-- 2단계: 호출 -->
  <rect x="40" y="220" width="556" height="140" rx="8" fill="#161E2D" stroke="#00A8A8" stroke-width="2"/>
  <text x="60" y="248" fill="#00A8A8" font-family="D2Coding" font-size="14" font-weight="bold">[ 2. 매 사용자 호출 ]</text>
  <text x="60" y="278" fill="#FFFFFF" font-family="D2Coding" font-size="14">User:</text>
  <text x="100" y="278" fill="#E6EDF3" font-family="D2Coding" font-size="14">/deploy</text>
  <text x="60" y="305" fill="#FFFFFF" font-family="D2Coding" font-size="13">  → SKILL.md 1회 lazy 로드</text>
  <text x="60" y="328" fill="#FFFFFF" font-family="D2Coding" font-size="13">  → 본문이 컨텍스트로 진입</text>
  <text x="60" y="351" fill="#00A8A8" font-family="D2Coding" font-size="14" font-weight="bold">→ 작업 실행</text>

  <!-- 화살표: 종료 -->
  <line x1="318" y1="370" x2="318" y2="400" stroke="#00A8A8" stroke-width="2" marker-end="url(#arrow-teal)"/>

  <!-- 3단계: 결과 -->
  <rect x="40" y="420" width="556" height="140" rx="8" fill="#1A2744" stroke="#00A8A8" stroke-width="2"/>
  <text x="60" y="448" fill="#00A8A8" font-family="D2Coding" font-size="15" font-weight="bold">결과:</text>
  <text x="60" y="475" fill="#FFFFFF" font-family="D2Coding" font-size="14">  • 토큰 비용 ≈ 0 (호출 시만)</text>
  <text x="60" y="500" fill="#FFFFFF" font-family="D2Coding" font-size="14">  • 절차 표준화 + git 버전 관리</text>
  <text x="60" y="525" fill="#FFFFFF" font-family="D2Coding" font-size="14">  • 팀 공유·재사용 가능</text>
  <text x="60" y="550" fill="#FFFFFF" font-family="D2Coding" font-size="14">  • 다른 AI 도구로 이식 가능</text>
</svg>
