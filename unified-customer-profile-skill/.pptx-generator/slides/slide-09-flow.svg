<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1296 624" preserveAspectRatio="xMidYMid meet" font-family="D2Coding">
  <defs>
    <marker id="arrow-teal-09" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00A8A8"/>
    </marker>
  </defs>

  <!-- ============ Section 1: 6채널 입력 (좌측) ============ -->
  <text x="160" y="40" text-anchor="middle" fill="#999999" font-size="14" font-style="italic">분산 채널 입력</text>

  <!-- 6 채널 박스들 -->
  <g font-size="14" font-weight="bold">
    <rect x="40" y="70" width="240" height="50" rx="6" fill="#1A2744" stroke="#5A6A7A" stroke-width="1.5"/>
    <text x="160" y="100" text-anchor="middle" fill="#FFFFFF">Web</text>

    <rect x="40" y="135" width="240" height="50" rx="6" fill="#1A2744" stroke="#5A6A7A" stroke-width="1.5"/>
    <text x="160" y="165" text-anchor="middle" fill="#FFFFFF">Mobile App</text>

    <rect x="40" y="200" width="240" height="50" rx="6" fill="#1A2744" stroke="#5A6A7A" stroke-width="1.5"/>
    <text x="160" y="230" text-anchor="middle" fill="#FFFFFF">Call Center</text>

    <rect x="40" y="265" width="240" height="50" rx="6" fill="#1A2744" stroke="#5A6A7A" stroke-width="1.5"/>
    <text x="160" y="295" text-anchor="middle" fill="#FFFFFF">OTA</text>

    <rect x="40" y="330" width="240" height="50" rx="6" fill="#1A2744" stroke="#5A6A7A" stroke-width="1.5"/>
    <text x="160" y="360" text-anchor="middle" fill="#FFFFFF">POS</text>

    <rect x="40" y="395" width="240" height="50" rx="6" fill="#1A2744" stroke="#5A6A7A" stroke-width="1.5"/>
    <text x="160" y="425" text-anchor="middle" fill="#FFFFFF">Corporate</text>
  </g>

  <!-- 채널 캡션 -->
  <text x="160" y="475" text-anchor="middle" fill="#999999" font-size="12">동일 고객을</text>
  <text x="160" y="492" text-anchor="middle" fill="#999999" font-size="12">다른 ID·이름 변형으로 기록</text>

  <!-- 화살표 채널 → ER -->
  <path d="M 285 95 L 405 270" fill="none" stroke="#00A8A8" stroke-width="2"/>
  <path d="M 285 160 L 405 280" fill="none" stroke="#00A8A8" stroke-width="2"/>
  <path d="M 285 225 L 405 290" fill="none" stroke="#00A8A8" stroke-width="2"/>
  <path d="M 285 290 L 405 300" fill="none" stroke="#00A8A8" stroke-width="2" marker-end="url(#arrow-teal-09)"/>
  <path d="M 285 355 L 405 320" fill="none" stroke="#00A8A8" stroke-width="2"/>
  <path d="M 285 420 L 405 340" fill="none" stroke="#00A8A8" stroke-width="2"/>

  <!-- ============ Section 2: Entity Resolution (중앙) ============ -->
  <text x="540" y="40" text-anchor="middle" fill="#999999" font-size="14" font-style="italic">동일 고객 식별</text>

  <rect x="410" y="115" width="265" height="290" rx="10" fill="#161E2D" stroke="#FF9900" stroke-width="2.5"/>
  <text x="540" y="155" text-anchor="middle" fill="#FF9900" font-size="20" font-weight="bold">Entity Resolution</text>
  <line x1="430" y1="170" x2="650" y2="170" stroke="#FF9900" stroke-width="1"/>

  <!-- 3 매칭 타입 -->
  <rect x="425" y="190" width="240" height="50" rx="5" fill="#1A2744" stroke="#5A6A7A" stroke-width="1"/>
  <text x="545" y="212" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold">Simple Rule</text>
  <text x="545" y="230" text-anchor="middle" fill="#999999" font-size="11">정확 일치 (LoyaltyNumber 등)</text>

  <rect x="425" y="250" width="240" height="50" rx="5" fill="#1A2744" stroke="#5A6A7A" stroke-width="1"/>
  <text x="545" y="272" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold">Advanced Rule</text>
  <text x="545" y="290" text-anchor="middle" fill="#999999" font-size="11">퍼지 매칭 (Cosine, Levenshtein)</text>

  <rect x="425" y="310" width="240" height="50" rx="5" fill="#1A2744" stroke="#5A6A7A" stroke-width="1"/>
  <text x="545" y="332" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold">ML Matching</text>
  <text x="545" y="350" text-anchor="middle" fill="#999999" font-size="11">학습 기반 확률 매칭</text>

  <text x="540" y="385" text-anchor="middle" fill="#FF9900" font-size="12" font-style="italic">3 타입 모두 자동 생성 + 비교</text>

  <!-- ER 캡션 -->
  <text x="540" y="475" text-anchor="middle" fill="#999999" font-size="12">매칭 규칙 자동 생성</text>
  <text x="540" y="492" text-anchor="middle" fill="#999999" font-size="12">(Bedrock + HITL 검증)</text>

  <!-- 화살표 ER → CP -->
  <line x1="675" y1="260" x2="785" y2="260" stroke="#00A8A8" stroke-width="3" marker-end="url(#arrow-teal-09)"/>

  <!-- ============ Section 3: Customer Profiles + CA (우측) ============ -->
  <text x="990" y="40" text-anchor="middle" fill="#999999" font-size="14" font-style="italic">360° 통합 프로필</text>

  <!-- CP Domain 박스 -->
  <rect x="790" y="115" width="465" height="120" rx="10" fill="#161E2D" stroke="#00A8A8" stroke-width="2.5"/>
  <text x="1022" y="150" text-anchor="middle" fill="#00A8A8" font-size="18" font-weight="bold">Customer Profiles</text>
  <text x="1022" y="170" text-anchor="middle" fill="#999999" font-size="12">Connect CP Domain</text>
  <line x1="810" y1="180" x2="1235" y2="180" stroke="#00A8A8" stroke-width="1"/>
  <text x="1022" y="202" text-anchor="middle" fill="#FFFFFF" font-size="13">Golden Record (도메인당 50KB max)</text>
  <text x="1022" y="222" text-anchor="middle" fill="#999999" font-size="12">100 Object Types · 200 Fields</text>

  <!-- Calculated Attributes 박스 -->
  <rect x="790" y="250" width="465" height="155" rx="10" fill="#161E2D" stroke="#FF9900" stroke-width="2"/>
  <text x="1022" y="285" text-anchor="middle" fill="#FF9900" font-size="18" font-weight="bold">Calculated Attributes</text>
  <text x="1022" y="305" text-anchor="middle" fill="#999999" font-size="12">자동 집계 지표 (도메인당 20개 max)</text>
  <line x1="810" y1="315" x2="1235" y2="315" stroke="#FF9900" stroke-width="1"/>

  <!-- CA 예시들 -->
  <text x="810" y="338" fill="#E6EDF3" font-size="12">  • TotalRevenueInAYear (SUM)</text>
  <text x="810" y="358" fill="#E6EDF3" font-size="12">  • OrderCountInAYear (COUNT)</text>
  <text x="1040" y="338" fill="#E6EDF3" font-size="12">  • AverageOrderValue (AVG)</text>
  <text x="1040" y="358" fill="#E6EDF3" font-size="12">  • MostRecentOrderDate</text>
  <text x="810" y="385" text-anchor="start" fill="#FF9900" font-size="11" font-style="italic">  → CLV, RFM, LastVisit 자동 계산</text>

  <!-- 출력 캡션 -->
  <text x="1022" y="475" text-anchor="middle" fill="#999999" font-size="12">SearchProfiles, ListProfileObjects</text>
  <text x="1022" y="492" text-anchor="middle" fill="#999999" font-size="12">API + Bedrock GenAI 활용</text>

  <!-- ============ 하단 요약 ============ -->
  <line x1="40" y1="525" x2="1255" y2="525" stroke="#5A6A7A" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="648" y="555" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="bold">UCP의 핵심 가치 :  분산 → 통합 → 자동 집계 → 360° 인사이트</text>
  <text x="648" y="585" text-anchor="middle" fill="#999999" font-size="12">채널·시간이 지나도 동일 고객은 한 명의 골든 레코드로 수렴</text>
  <text x="648" y="605" text-anchor="middle" fill="#FF9900" font-size="13" font-style="italic">→ 고객 경험 통합 · 마케팅 ROI 향상 · 회복 가능한 데이터 자산</text>
</svg>
