<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1296 624" preserveAspectRatio="xMidYMid meet" font-family="D2Coding">
  <!-- ============ 좌측: 디렉토리 트리 (67%) ============ -->
  <text x="20" y="30" fill="#FF9900" font-size="16" font-weight="bold">unified-customer-profile-skill/</text>

  <!-- 어댑터 영역 (얇은 박스) -->
  <rect x="14" y="50" width="836" height="150" rx="6" fill="#161E2D" stroke="#5A6A7A" stroke-width="1.5"/>
  <text x="30" y="78" fill="#5A6A7A" font-size="13" font-weight="bold">어댑터 (얇은 진입점, 합 ~14 KB)</text>

  <text x="30" y="105" fill="#FFFFFF" font-size="13">├─ quick/</text>
  <text x="160" y="105" fill="#999999" font-size="12">SKILL.md  (~6 KB)</text>
  <text x="430" y="105" fill="#5A6A7A" font-size="11" font-style="italic">→ Amazon Quick 어댑터</text>

  <text x="30" y="130" fill="#FFFFFF" font-size="13">├─ kiro/</text>
  <text x="160" y="130" fill="#999999" font-size="12">steering.md + specs/  (~4 KB)</text>
  <text x="430" y="130" fill="#5A6A7A" font-size="11" font-style="italic">→ Kiro Steering Rules + Spec</text>

  <text x="30" y="155" fill="#FFFFFF" font-size="13">├─ claude-code/</text>
  <text x="200" y="155" fill="#999999" font-size="12">CLAUDE.md + commands/  (~4 KB)</text>
  <text x="430" y="155" fill="#5A6A7A" font-size="11" font-style="italic">→ Claude Code 슬래시 커맨드</text>

  <text x="30" y="185" fill="#FF9900" font-size="11" font-style="italic">동일한 shared/ 참조 → 도구를 옮겨도 출력 일관</text>

  <!-- shared/ 영역 (강조 박스) -->
  <rect x="14" y="220" width="836" height="320" rx="10" fill="#1A2744" stroke="#FF9900" stroke-width="3"/>
  <text x="30" y="250" fill="#FF9900" font-size="18" font-weight="bold">└─ shared/  ★ 진짜 자산 (~96 KB)</text>

  <!-- 3 sub-folders -->
  <rect x="30" y="270" width="265" height="250" rx="6" fill="#161E2D" stroke="#FF9900" stroke-width="1.5"/>
  <text x="45" y="295" fill="#FF9900" font-size="14" font-weight="bold">reference/  19 KB</text>
  <text x="45" y="313" fill="#999999" font-size="11" font-style="italic">WHY · 결정 근거</text>
  <text x="45" y="345" fill="#FFFFFF" font-size="12">• architecture.md</text>
  <text x="45" y="365" fill="#999999" font-size="11">  9-레이어 + 데이터 흐름</text>
  <text x="45" y="395" fill="#FFFFFF" font-size="12">• decision-tree.md</text>
  <text x="45" y="415" fill="#999999" font-size="11">  6 분기 결정 로직</text>
  <text x="45" y="445" fill="#FFFFFF" font-size="12">• aws-services.md</text>
  <text x="45" y="465" fill="#999999" font-size="11">  Quota·비용·리전</text>
  <text x="45" y="495" fill="#FFFFFF" font-size="12">• constraints.md</text>
  <text x="45" y="513" fill="#999999" font-size="11">  알려진 제약·함정</text>

  <rect x="305" y="270" width="265" height="250" rx="6" fill="#161E2D" stroke="#FF9900" stroke-width="1.5"/>
  <text x="320" y="295" fill="#FF9900" font-size="14" font-weight="bold">patterns/  58 KB ★</text>
  <text x="320" y="313" fill="#999999" font-size="11" font-style="italic">HOW · 코드 템플릿</text>
  <text x="320" y="345" fill="#FFFFFF" font-size="12">• cdk-stacks.md</text>
  <text x="320" y="365" fill="#FFFFFF" font-size="12">• lambda-handlers.md</text>
  <text x="320" y="385" fill="#FFFFFF" font-size="12">• frontend-pages.md</text>
  <text x="320" y="405" fill="#FFFFFF" font-size="12">• er-strategies.md</text>
  <text x="320" y="425" fill="#FFFFFF" font-size="12">• bedrock-prompts.md</text>
  <text x="320" y="445" fill="#FFFFFF" font-size="12">• etl-transforms.md</text>
  <text x="320" y="495" fill="#FF9900" font-size="11" font-style="italic">→ 무게중심 (60% of shared)</text>

  <rect x="580" y="270" width="265" height="250" rx="6" fill="#161E2D" stroke="#FF9900" stroke-width="1.5"/>
  <text x="595" y="295" fill="#FF9900" font-size="14" font-weight="bold">examples/  12 KB</text>
  <text x="595" y="313" fill="#999999" font-size="11" font-style="italic">WHAT · 산업 골든 레퍼런스</text>
  <text x="595" y="345" fill="#FFFFFF" font-size="12">• travel.md</text>
  <text x="595" y="365" fill="#999999" font-size="11">  3 도메인 + Cross-Domain</text>
  <text x="595" y="395" fill="#FFFFFF" font-size="12">• hotel.md</text>
  <text x="595" y="415" fill="#999999" font-size="11">  단일 도메인 + OTA relay</text>
  <text x="595" y="445" fill="#FFFFFF" font-size="12">• retail.md</text>
  <text x="595" y="465" fill="#999999" font-size="11">  게스트 구매 + RFM</text>
  <text x="595" y="495" fill="#FF9900" font-size="11" font-style="italic">→ 신규 산업 추가의 단위</text>

  <!-- evals -->
  <rect x="14" y="555" width="836" height="55" rx="6" fill="#161E2D" stroke="#5A6A7A" stroke-width="1.5"/>
  <text x="30" y="580" fill="#5A6A7A" font-size="13" font-weight="bold">evals/   회귀 테스트 (Skill 수정 시 출력 검증)</text>
  <text x="30" y="600" fill="#999999" font-size="12">└─ travel-scenario / hotel-scenario / retail-scenario.md</text>

  <!-- ============ 우측 33% Top: 사이즈 비교 막대차트 ============ -->
  <rect x="870" y="20" width="410" height="290" rx="10" fill="#1A2744" stroke="#5A6A7A" stroke-width="1.5"/>
  <text x="890" y="50" fill="#FFFFFF" font-size="16" font-weight="bold">사이즈 비교 (KB)</text>
  <line x1="890" y1="60" x2="1265" y2="60" stroke="#5A6A7A" stroke-width="1"/>

  <!-- 막대 차트 -->
  <text x="890" y="90" fill="#FFFFFF" font-size="13">patterns/</text>
  <rect x="890" y="100" width="290" height="22" fill="#FF9900"/>
  <text x="1190" y="117" fill="#FFFFFF" font-size="12" font-weight="bold">58 KB</text>

  <text x="890" y="145" fill="#FFFFFF" font-size="13">reference/</text>
  <rect x="890" y="155" width="95" height="22" fill="#FF9900" opacity="0.7"/>
  <text x="995" y="172" fill="#FFFFFF" font-size="12" font-weight="bold">19 KB</text>

  <text x="890" y="200" fill="#FFFFFF" font-size="13">examples/</text>
  <rect x="890" y="210" width="60" height="22" fill="#FF9900" opacity="0.5"/>
  <text x="960" y="227" fill="#FFFFFF" font-size="12" font-weight="bold">12 KB</text>

  <text x="890" y="255" fill="#5A6A7A" font-size="13">어댑터 3종 합</text>
  <rect x="890" y="265" width="70" height="22" fill="#5A6A7A"/>
  <text x="970" y="282" fill="#999999" font-size="12">14 KB</text>

  <text x="890" y="300" fill="#FF9900" font-size="11" font-style="italic">shared 합 89 KB (87%) vs 어댑터 14 KB (13%)</text>

  <!-- ============ 우측 33% Bottom: 핵심 메시지 ============ -->
  <rect x="870" y="330" width="410" height="280" rx="10" fill="#1A2744" stroke="#FF9900" stroke-width="2.5"/>
  <text x="890" y="365" fill="#FF9900" font-size="16" font-weight="bold">핵심 통찰</text>
  <line x1="890" y1="378" x2="1265" y2="378" stroke="#FF9900" stroke-width="1"/>

  <text x="890" y="408" fill="#FFFFFF" font-size="14" font-weight="bold">패키지 가치는 어댑터가 아니라</text>
  <text x="890" y="430" fill="#FFFFFF" font-size="14" font-weight="bold">shared/에 있다</text>

  <text x="890" y="465" fill="#E6EDF3" font-size="12">• 한 번 갱신 → 세 도구 일관</text>
  <text x="890" y="490" fill="#E6EDF3" font-size="12">• 새 산업 = examples/ 한 장</text>
  <text x="890" y="515" fill="#E6EDF3" font-size="12">• 도구 lock-in 회피</text>
  <text x="890" y="540" fill="#E6EDF3" font-size="12">• 회귀 테스트로 출력 보호</text>

  <text x="890" y="580" fill="#FF9900" font-size="12" font-style="italic">→ 도메인 지식이 도구를</text>
  <text x="890" y="600" fill="#FF9900" font-size="12" font-style="italic">    선택할 자유를 만든다</text>
</svg>
