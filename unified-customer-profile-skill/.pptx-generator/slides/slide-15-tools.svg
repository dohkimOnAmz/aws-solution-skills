<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1296 624" preserveAspectRatio="xMidYMid meet" font-family="D2Coding">
  <!-- ============ Card 1: Amazon Quick (Q) ============ -->
  <rect x="20" y="20" width="410" height="580" rx="12" fill="#1A2744" stroke="#FF9900" stroke-width="2.5"/>

  <!-- 헤더 -->
  <rect x="20" y="20" width="410" height="80" rx="12" fill="#FF9900"/>
  <text x="225" y="70" text-anchor="middle" fill="#161E2D" font-size="22" font-weight="bold">Amazon Quick (Q)</text>

  <text x="40" y="135" fill="#FFFFFF" font-size="14" font-weight="bold">자연어 트리거 + Settings UI</text>
  <text x="40" y="155" fill="#999999" font-size="12" font-style="italic">백그라운드 태스크 + MCP 연동</text>

  <text x="40" y="195" fill="#FF9900" font-size="13" font-weight="bold">셋업 (3단계):</text>
  <text x="40" y="220" fill="#FFFFFF" font-size="12">1. Settings → Capabilities</text>
  <text x="40" y="245" fill="#FFFFFF" font-size="12">2. Skills → Import</text>
  <text x="40" y="270" fill="#FFFFFF" font-size="12">3. quick/SKILL.md 선택</text>

  <rect x="40" y="290" width="370" height="40" rx="6" fill="#161E2D" stroke="#5A6A7A" stroke-width="1"/>
  <text x="50" y="316" fill="#999999" font-size="11">⏱  소요</text>
  <text x="395" y="316" text-anchor="end" fill="#00A8A8" font-size="14" font-weight="bold">~30초</text>

  <text x="40" y="370" fill="#FF9900" font-size="13" font-weight="bold">트리거 (자연어):</text>
  <rect x="40" y="385" width="370" height="50" rx="6" fill="#161E2D" stroke="#FF9900" stroke-width="1.5"/>
  <text x="50" y="408" fill="#FF9900" font-size="12" font-style="italic">"고객 프로필 통합</text>
  <text x="50" y="427" fill="#FF9900" font-size="12" font-style="italic">  시스템 만들어줘"</text>

  <text x="40" y="475" fill="#FFFFFF" font-size="13" font-weight="bold">적합 시나리오:</text>
  <text x="40" y="500" fill="#E6EDF3" font-size="12">  • PoC, 데모 환경</text>
  <text x="40" y="522" fill="#E6EDF3" font-size="12">  • 채팅 인터페이스 선호</text>
  <text x="40" y="544" fill="#E6EDF3" font-size="12">  • run_python, file_*</text>
  <text x="40" y="566" fill="#E6EDF3" font-size="12">    내장 도구 사용</text>
  <text x="40" y="590" fill="#999999" font-size="11" font-style="italic">→ 의사결정자에게 시연</text>

  <!-- ============ Card 2: Kiro IDE ============ -->
  <rect x="446" y="20" width="410" height="580" rx="12" fill="#1A2744" stroke="#7B61FF" stroke-width="2.5"/>

  <!-- 헤더 -->
  <rect x="446" y="20" width="410" height="80" rx="12" fill="#7B61FF"/>
  <text x="651" y="70" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold">Kiro IDE</text>

  <text x="466" y="135" fill="#FFFFFF" font-size="14" font-weight="bold">Steering Rules + Spec</text>
  <text x="466" y="155" fill="#999999" font-size="12" font-style="italic">IDE 내 프로젝트 생성·수정</text>

  <text x="466" y="195" fill="#7B61FF" font-size="13" font-weight="bold">셋업 (1줄):</text>
  <rect x="466" y="210" width="370" height="40" rx="6" fill="#161E2D" stroke="#5A6A7A" stroke-width="1"/>
  <text x="476" y="234" fill="#E6EDF3" font-size="11">$ cp -r kiro/.kiro/ &lt;project&gt;/.kiro/</text>

  <text x="466" y="280" fill="#FFFFFF" font-size="12">또는 workspace에</text>
  <text x="466" y="300" fill="#FFFFFF" font-size="12">steering.md를 Steering Rules로 등록</text>

  <rect x="466" y="320" width="370" height="40" rx="6" fill="#161E2D" stroke="#5A6A7A" stroke-width="1"/>
  <text x="476" y="346" fill="#999999" font-size="11">⏱  소요</text>
  <text x="821" y="346" text-anchor="end" fill="#00A8A8" font-size="14" font-weight="bold">~30초</text>

  <text x="466" y="395" fill="#7B61FF" font-size="13" font-weight="bold">트리거:</text>
  <rect x="466" y="410" width="370" height="50" rx="6" fill="#161E2D" stroke="#7B61FF" stroke-width="1.5"/>
  <text x="476" y="433" fill="#7B61FF" font-size="12" font-style="italic">"Using AI-DLC,</text>
  <text x="476" y="452" fill="#7B61FF" font-size="12" font-style="italic">  UCP를 만들어주세요"</text>

  <text x="466" y="495" fill="#FFFFFF" font-size="13" font-weight="bold">적합 시나리오:</text>
  <text x="466" y="520" fill="#E6EDF3" font-size="12">  • IDE 내 코드 작성</text>
  <text x="466" y="542" fill="#E6EDF3" font-size="12">  • 기존 프로젝트 수정</text>
  <text x="466" y="564" fill="#E6EDF3" font-size="12">  • AI-DLC 워크플로우</text>
  <text x="466" y="586" fill="#999999" font-size="11" font-style="italic">→ 엔지니어에게 권장</text>

  <!-- ============ Card 3: Claude Code ============ -->
  <rect x="872" y="20" width="404" height="580" rx="12" fill="#1A2744" stroke="#00A8A8" stroke-width="2.5"/>

  <!-- 헤더 -->
  <rect x="872" y="20" width="404" height="80" rx="12" fill="#00A8A8"/>
  <text x="1074" y="70" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold">Claude Code (CLI)</text>

  <text x="892" y="135" fill="#FFFFFF" font-size="14" font-weight="bold">CLAUDE.md + 슬래시 커맨드</text>
  <text x="892" y="155" fill="#999999" font-size="12" font-style="italic">Anthropic 공식 CLI 에이전트</text>

  <text x="892" y="195" fill="#00A8A8" font-size="13" font-weight="bold">셋업 (2줄):</text>
  <rect x="892" y="210" width="364" height="62" rx="6" fill="#161E2D" stroke="#5A6A7A" stroke-width="1"/>
  <text x="902" y="234" fill="#E6EDF3" font-size="11">$ cp claude-code/CLAUDE.md ./</text>
  <text x="902" y="258" fill="#E6EDF3" font-size="11">$ cp -r commands/ .claude/commands/</text>

  <rect x="892" y="290" width="364" height="40" rx="6" fill="#161E2D" stroke="#5A6A7A" stroke-width="1"/>
  <text x="902" y="316" fill="#999999" font-size="11">⏱  소요</text>
  <text x="1241" y="316" text-anchor="end" fill="#00A8A8" font-size="14" font-weight="bold">~1분</text>

  <text x="892" y="370" fill="#00A8A8" font-size="13" font-weight="bold">트리거 (슬래시 커맨드):</text>
  <rect x="892" y="385" width="364" height="50" rx="6" fill="#161E2D" stroke="#00A8A8" stroke-width="1.5"/>
  <text x="902" y="416" fill="#00A8A8" font-size="16" font-weight="bold">/generate-ucp</text>

  <text x="892" y="475" fill="#FFFFFF" font-size="13" font-weight="bold">적합 시나리오:</text>
  <text x="892" y="500" fill="#E6EDF3" font-size="12">  • CLI 자동화 환경</text>
  <text x="892" y="522" fill="#E6EDF3" font-size="12">  • 정교한 권한 제어</text>
  <text x="892" y="544" fill="#E6EDF3" font-size="12">    (allowed-tools)</text>
  <text x="892" y="566" fill="#E6EDF3" font-size="12">  • 전체 프로젝트 생성</text>
  <text x="892" y="590" fill="#999999" font-size="11" font-style="italic">→ DevOps 엔지니어에게</text>
</svg>
