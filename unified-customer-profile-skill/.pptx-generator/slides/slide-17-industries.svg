  <text x="886" y="105" fill="#FFFFFF" font-size="11" font-weight="bold">도메인</text>
  <text x="966" y="105" fill="#E6EDF3" font-size="11">단일</text>
  <text x="1086" y="105" fill="#FFFFFF" font-size="11" font-weight="bold">난이도</text>
  <text x="1166" y="105" fill="#FF9900" font-size="13" font-weight="bold">★★</text>

  <line x1="886" y1="115" x2="1256" y2="115" stroke="#5A6A7A" stroke-width="1" opacity="0.3"/>

  <text x="886" y="138" fill="#FF9900" font-size="13" font-weight="bold">채널 구성 (5개)</text>
  <text x="886" y="158" fill="#999999" font-size="11">  Web · Mobile · POS</text>
  <text x="886" y="175" fill="#999999" font-size="11">  Call Center · Marketplace</text>

  <text x="886" y="205" fill="#FF9900" font-size="13" font-weight="bold">핵심 ER 규칙</text>
  <text x="886" y="225" fill="#E6EDF3" font-size="11">  • LoyaltyNumber (정확)</text>
  <text x="886" y="243" fill="#E6EDF3" font-size="11">  • EmailOnly (1인 1메일 가정)</text>
  <text x="886" y="261" fill="#E6EDF3" font-size="11">  • NameAndPhone (POS 멤버십)</text>

  <text x="886" y="290" fill="#FF9900" font-size="13" font-weight="bold">필수 옵션</text>
  <text x="886" y="312" fill="#E6EDF3" font-size="11">  ✗ Cross-Domain OFF (단일)</text>
  <text x="886" y="330" fill="#E6EDF3" font-size="11">  ✗ Graph OFF</text>
  <text x="886" y="348" fill="#E6EDF3" font-size="11">  ✓ Pipeline: Kinesis (실시간)</text>

  <text x="886" y="378" fill="#FF9900" font-size="13" font-weight="bold">특화 가치</text>
  <text x="886" y="398" fill="#E6EDF3" font-size="11">  • RFM 세그먼트 자동 분류</text>
  <text x="886" y="418" fill="#999999" font-size="10">    Champion·Loyal·AtRisk·Lost·New</text>
  <text x="886" y="438" fill="#E6EDF3" font-size="11">  • 게스트 구매 처리</text>
  <text x="886" y="458" fill="#999999" font-size="10">    (이메일만 있고 이름 없음)</text>

  <rect x="886" y="478" width="370" height="60" rx="6" fill="#161E2D" stroke="#FF9900" stroke-width="1.5"/>
  <text x="906" y="503" fill="#FFFFFF" font-size="11">월 비용</text>
  <text x="1071" y="510" text-anchor="middle" fill="#FF9900" font-size="22" font-weight="bold">$100 - 200</text>
  <text x="1071" y="528" text-anchor="middle" fill="#999999" font-size="10" font-style="italic">Standard 티어 — 실시간 + ML 매칭</text>

  <!-- ============ 하단 메시지 ============ -->
  <text x="648" y="595" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold">신규 산업 (금융 · 헬스케어 · 텔코) = shared/examples/ 한 장 추가</text>
