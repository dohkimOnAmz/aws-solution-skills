<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 636 580" preserveAspectRatio="xMidYMid meet" font-family="D2Coding">
  <defs>
    <marker id="arr-21" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7B61FF"/>
    </marker>
  </defs>

  <!-- 베이스 (CP만 강조 + 새 Layer 8 추가) -->
  <rect x="20" y="20" width="596" height="320" rx="8" fill="#161E2D" stroke="#7B61FF" stroke-width="2"/>
  <text x="318" y="48" text-anchor="middle" fill="#7B61FF" font-size="14" font-weight="bold">베이스 + Layer 8 추가 ★</text>

  <!-- CP Domain (그대로) -->
  <rect x="40" y="70" width="240" height="80" rx="6" fill="#1A2744" stroke="#FF9900" stroke-width="1.5"/>
