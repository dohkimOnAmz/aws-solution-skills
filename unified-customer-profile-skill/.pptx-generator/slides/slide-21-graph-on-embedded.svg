  <text x="75" y="138" text-anchor="middle" fill="#FFFFFF" font-size="10">Connect CP</text>
  <text x="180" y="100" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">CP Domain</text>
