<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 636 580" preserveAspectRatio="xMidYMid meet" font-family="D2Coding">
  <defs>
    <marker id="arr-22a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00A8A8"/>
    </marker>
  </defs>

  <!-- Connect Instance × 1 -->
  <rect x="40" y="20" width="556" height="100" rx="8" fill="#1A2744" stroke="#5A6A7A" stroke-width="1.5"/>
  <image href="data:image/png;base64," x="60" y="42" width="48" height="48"/>
  <text x="84" y="105" text-anchor="middle" fill="#FFFFFF" font-size="10">Connect</text>
  <text x="160" y="50" fill="#FFFFFF" font-size="14" font-weight="bold">Connect Instance × 1</text>
  <text x="160" y="72" fill="#999999" font-size="11">계정당 quota 2개 사용 중 1개</text>
  <text x="160" y="92" fill="#5A6A7A" font-size="10" font-style="italic">CP의 컨테이너 (단일 사업부)</text>

  <!-- 화살표 -->
  <line x1="318" y1="125" x2="318" y2="155" stroke="#00A8A8" stroke-width="2" marker-end="url(#arr-22a)"/>

  <!-- CP Domain × 1 -->
  <rect x="40" y="160" width="556" height="190" rx="8" fill="#161E2D" stroke="#FF9900" stroke-width="2"/>
  <text x="318" y="190" text-anchor="middle" fill="#FF9900" font-size="14" font-weight="bold">CP Domain × 1</text>
  <line x1="60" y1="200" x2="576" y2="200" stroke="#FF9900" stroke-width="1" opacity="0.4"/>

  <text x="60" y="225" fill="#FFFFFF" font-size="11">  • Object Types  (Reservation, Order, ...)</text>
  <text x="60" y="248" fill="#FFFFFF" font-size="11">  • Calculated Attributes  (CLV, RFM)</text>
  <text x="60" y="271" fill="#FFFFFF" font-size="11">  • ER Workflow × 3  (Simple/Advanced/ML)</text>
  <text x="60" y="294" fill="#FFFFFF" font-size="11">  • Search / Get / Put Profile API</text>

  <text x="318" y="325" text-anchor="middle" fill="#5A6A7A" font-size="11" font-style="italic">한 사업부 안의 모든 채널 통합</text>

  <!-- 적합 -->
  <rect x="40" y="370" width="556" height="120" rx="8" fill="#1A2744" stroke="#00A8A8" stroke-width="1.5"/>
  <text x="60" y="395" fill="#00A8A8" font-size="13" font-weight="bold">✓ 적합 시나리오</text>
  <text x="60" y="420" fill="#E6EDF3" font-size="11">  • 단일 호텔 체인</text>
  <text x="60" y="440" fill="#E6EDF3" font-size="11">  • 단일 이커머스 브랜드</text>
  <text x="60" y="460" fill="#E6EDF3" font-size="11">  • 단일 항공사 (예약 통합)</text>
  <text x="60" y="480" fill="#E6EDF3" font-size="11">  • 단일 보험·은행 (한 라인)</text>

  <!-- 비용 / quota -->
  <rect x="40" y="500" width="556" height="70" rx="8" fill="#161E2D" stroke="#5A6A7A" stroke-width="1.5"/>
  <text x="60" y="525" fill="#FFFFFF" font-size="12">Connect quota 사용</text>
  <text x="576" y="528" text-anchor="end" fill="#00A8A8" font-size="14" font-weight="bold">1개 / 2 (default)</text>
  <text x="60" y="550" fill="#FFFFFF" font-size="12">월 비용 추가</text>
  <text x="576" y="553" text-anchor="end" fill="#00A8A8" font-size="18" font-weight="bold">$0</text>
